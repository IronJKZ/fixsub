name: Feature request
description: Propose a focused improvement to fixsub.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the user problem this request would solve.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the outcome users should achieve.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain workarounds or other approaches you considered.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and compatibility notes
      description: Note expected scope, compatibility effects, or platform considerations.
    validations:
      required: true
